name : my test workflow
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: install nodejs
              uses: actions/setup-node@v6
              with:
                node-version: 24
            - name: install dependencies
              run: npm ci
            - name: run tests
              run: npm test


